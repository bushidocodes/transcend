# Prod-parity local stack: app + Postgres (issue #238).
# Usage:
#   docker compose up --build
# Then open http://localhost:1337
#
# Override SESSION_SECRET before any real deploy. CLIENT_ID/CLIENT_SECRET are
# dummy placeholders so the Google strategy can construct; local password auth
# works without real Google credentials.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: transcend
      POSTGRES_PASSWORD: transcend
      POSTGRES_DB: transcend
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U transcend -d transcend']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - '1337:1337'
    environment:
      NODE_ENV: production
      PORT: 1337
      DATABASE_URL: postgres://transcend:transcend@db:5432/transcend
      # REQUIRED in production — replace for anything beyond local compose.
      SESSION_SECRET: compose-dev-only-change-me-before-real-deploy
      # Passport Google strategy constructs at boot; dummies keep the process up.
      CLIENT_ID: docker-compose-dummy-client-id
      CLIENT_SECRET: docker-compose-dummy-client-secret
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:1337/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

volumes:
  pgdata:
