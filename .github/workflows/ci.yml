name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    # User-model tests hit Postgres. db/index.ts (under NODE_ENV=testing) reads DATABASE_TEST_URL
    # and force-syncs the schema, so the database just needs to exist.
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: transcend_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Format + light lint (Biome). Correctness is enforced by typecheck (TS 7 / tsconfig).
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          DATABASE_TEST_URL: postgres://postgres:postgres@localhost:5432/transcend_test
